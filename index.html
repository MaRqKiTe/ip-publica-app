<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geolocalización por IP</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Información de tu IP</h1>
      <p class="description">
        Esta aplicación obtiene tu IP pública y consulta su geolocalización.
      </p>

      <div class="info-box">
        <p><strong>IP:</strong> <span id="ip">Cargando...</span></p>
        <p><strong>Continente:</strong> <span id="continent">Cargando...</span></p>
        <p><strong>Ciudad:</strong> <span id="city">Cargando...</span></p>
      </div>

      <button id="btnActualizar">Actualizar información</button>
      <p id="status" class="status"></p>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
